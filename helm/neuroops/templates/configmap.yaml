apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "neuroops.fullname" . }}-config
  labels:
    {{- include "neuroops.labels" . | nindent 4 }}
data:
  PROMETHEUS_URL: {{ .Values.prometheus.url | quote }}
  JAEGER_QUERY_URL: {{ .Values.jaeger.queryUrl | quote }}
  OTEL_COLLECTOR_ENDPOINT: {{ .Values.otel.collectorEndpoint | quote }}
  TARGET_NAMESPACE: {{ .Values.app.targetNamespace | quote }}
  CONFIDENCE_THRESHOLD: {{ .Values.app.confidenceThreshold | quote }}
  ANOMALY_CONTAMINATION: {{ .Values.app.anomalyContamination | quote }}
  SLACK_CHANNEL_ID: {{ .Values.app.slackChannelId | quote }}
  DETECTOR_URL: {{ printf "http://%s-detector:%d" (include "neuroops.fullname" .) (int .Values.detector.service.port) | quote }}
  AGENT_URL: {{ printf "http://%s-agent:%d" (include "neuroops.fullname" .) (int .Values.agent.service.port) | quote }}
  REMEDIATOR_URL: {{ printf "http://%s-remediator:%d" (include "neuroops.fullname" .) (int .Values.remediator.service.port) | quote }}
