{{- if .Values.agent.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "neuroops.fullname" . }}-agent
  labels:
    {{- include "neuroops.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  type: {{ .Values.agent.service.type }}
  selector:
    {{- include "neuroops.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: agent
  ports:
    - name: http
      port: {{ .Values.agent.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
