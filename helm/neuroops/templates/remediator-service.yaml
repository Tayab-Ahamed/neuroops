{{- if .Values.remediator.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "neuroops.fullname" . }}-remediator
  labels:
    {{- include "neuroops.labels" . | nindent 4 }}
    app.kubernetes.io/component: remediator
spec:
  type: {{ .Values.remediator.service.type }}
  selector:
    {{- include "neuroops.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: remediator
  ports:
    - name: http
      port: {{ .Values.remediator.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
