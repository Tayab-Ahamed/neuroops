name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-v2
          restore-keys: ${{ runner.os }}-pip-

      - name: Install linting tools
        run: pip install --upgrade pip black isort ruff

      - name: black
        run: black --check detector/ agent/ remediator/ observability/ benchmarks/

      - name: isort
        run: isort --check detector/ agent/ remediator/ observability/ benchmarks/

      - name: ruff
        run: ruff check detector/ agent/ remediator/ observability/ benchmarks/

  # ── Detector Tests ───────────────────────────────────────────────────────────
  test-detector:
    name: Test / Detector
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: detector
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-detector-${{ hashFiles('detector/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Run tests
        env:
          PROMETHEUS_URL: http://localhost:9090
        run: |
          pytest tests \
            --cov=. \
            --cov-report=xml \
            --tb=short \
            -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          flags: detector
          fail_ci_if_error: false

  # ── Agent Tests ──────────────────────────────────────────────────────────────
  test-agent:
    name: Test / Agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-agent-${{ hashFiles('agent/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies (no chromadb build extras)
        run: |
          pip install --upgrade pip
          # Install chromadb with --no-build-isolation to skip heavy hnswlib compile
          pip install "chromadb>=0.5.0" --prefer-binary --quiet
          pip install -r requirements.txt

      - name: Run tests
        env:
          ANTHROPIC_API_KEY: dummy-key-for-tests
          OPENAI_API_KEY: dummy-key-for-tests
          OTEL_SDK_DISABLED: "true"
          PYTHONPATH: .
        run: |
          pytest tests \
            --cov=. \
            --cov-report=xml \
            --tb=short \
            --ignore=tests/test_e2e_integration.py \
            -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          flags: agent
          fail_ci_if_error: false

  # ── Remediator Tests ─────────────────────────────────────────────────────────
  test-remediator:
    name: Test / Remediator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-remediator-${{ hashFiles('remediator/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r remediator/requirements.txt

      - name: Run tests
        # Tests import via 'from remediator.actions.X import Y' — must run from repo root
        run: |
          pytest remediator/tests \
            --cov=remediator \
            --cov-report=xml \
            --tb=short \
            -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          flags: remediator
          fail_ci_if_error: false

  # ── Observability Tests ──────────────────────────────────────────────────────
  test-observability:
    name: Test / Observability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-observability-v2
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov rich httpx pydantic structlog click

      # Observability tests are asset/config verification tests (no importable source).
      # We skip --cov-fail-under for this job since coverage measures Python source
      # coverage, and the tests deliberately only validate JSON/YAML config files.
      - name: Run tests
        env:
          PYTHONPATH: observability
        run: |
          pytest observability/tests \
            --tb=short \
            -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          flags: observability
          fail_ci_if_error: false


  # ── Benchmarks Tests ─────────────────────────────────────────────────────────
  test-benchmarks:
    name: Test / Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-benchmarks-${{ hashFiles('benchmarks/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r benchmarks/requirements.txt

      - name: Run tests
        # Tests import via 'from benchmarks.runner import ...' — must run from repo root
        run: |
          pytest benchmarks/tests \
            --cov=benchmarks \
            --cov-report=xml \
            --tb=short \
            -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          flags: benchmarks
          fail_ci_if_error: false


  # ── Docker Build ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker / ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [detector, agent, remediator]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: false
          tags: neuroops-${{ matrix.service }}:ci
          # Use build cache to speed up Docker layer reuse
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Security ─────────────────────────────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security-v2
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Bandit
        run: pip install --upgrade pip "bandit[toml]"

      - name: Bandit
        run: >
          bandit -c pyproject.toml -r
          detector/ agent/ remediator/ observability/ benchmarks/
          -x "**/tests/*,**/.venv/*"

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@v3.88.18
        with:
          path: ./
          # Only scan new commits on PR, full scan on push to main
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || 'HEAD' }}
          extra_args: --only-verified

  # ── CI Gate ──────────────────────────────────────────────────────────────────
  ci-ok:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - lint
      - test-detector
      - test-agent
      - test-remediator
      - test-observability
      - test-benchmarks
      - docker-build
      - security
    steps:
      - run: echo "All checks passed ✓"
