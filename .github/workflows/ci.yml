name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ─────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint
          restore-keys: ${{ runner.os }}-pip-

      - name: Install linting tools
        run: pip install --upgrade pip black isort ruff

      - name: black
        run: black --check detector/ agent/ remediator/ observability/ benchmarks/

      - name: isort
        run: isort --check detector/ agent/ remediator/ observability/ benchmarks/

      - name: ruff
        run: ruff check detector/ agent/ remediator/ observability/ benchmarks/

  # ── Tests ─────────────────────────────────────────────────────
  test-detector:
    name: Test / Detector
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST }}
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN_TEST }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-detector-${{ hashFiles('detector/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - run: pip install --upgrade pip && pip install -r detector/requirements.txt
      - run: pytest detector/tests --cov=detector --cov-report=xml -q

  test-agent:
    name: Test / Agent
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST }}
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN_TEST }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-agent-${{ hashFiles('agent/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - run: pip install --upgrade pip && pip install -r agent/requirements.txt
      - run: pytest agent/tests --cov=agent --cov-report=xml -q

  test-remediator:
    name: Test / Remediator
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST }}
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN_TEST }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-remediator-${{ hashFiles('remediator/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - run: pip install --upgrade pip && pip install -r remediator/requirements.txt
      - run: pytest remediator/tests --cov=remediator --cov-report=xml -q

  test-observability:
    name: Test / Observability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-observability
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install rich httpx pydantic structlog pytest pytest-cov click
      - run: pytest observability/tests --cov=observability --cov-report=xml -q

  test-benchmarks:
    name: Test / Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-benchmarks-${{ hashFiles('benchmarks/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - run: pip install --upgrade pip && pip install -r benchmarks/requirements.txt
      - run: pytest benchmarks/tests --cov=benchmarks --cov-report=xml -q

  # ── Docker Build ──────────────────────────────────────────────
  docker-build:
    name: Docker / ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [detector, agent, remediator]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: false
          tags: neuroops-${{ matrix.service }}:ci

  # ── Security ──────────────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Bandit
        run: pip install --upgrade pip "bandit[toml]"

      - name: Bandit
        run: >
          bandit -c pyproject.toml -r
          detector/ agent/ remediator/ observability/ benchmarks/
          -x "**/tests/*,**/.venv/*"

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./

  # ── CI Gate ───────────────────────────────────────────────────
  ci-ok:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - lint
      - test-detector
      - test-agent
      - test-remediator
      - test-observability
      - test-benchmarks
      - docker-build
      - security
    steps:
      - run: echo "All checks passed ✓"
