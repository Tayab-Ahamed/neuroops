name: Feature Request
description: Suggest a new feature or improvement for NeuroOps
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve NeuroOps! Please describe your idea clearly.
  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      placeholder: What problem does this solve? What use case does it enable?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      placeholder: Describe the feature you'd like to see
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      placeholder: Any other approaches you considered?
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Detector
        - Agent / LangGraph
        - Remediator
        - Observability
        - Web UI
        - Helm / Deployment
        - New component
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low (nice-to-have)
        - Medium (would significantly help)
        - High (blocking a real use case)
