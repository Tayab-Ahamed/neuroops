mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib
  tag: 0.111.0

# Mount OTel Collector config directly
config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
  processors:
    batch: {}
    memory_limiter:
      limit_percentage: 80
      spike_limit_percentage: 20
      check_interval: 5s
  exporters:
    # Forward traces directly to the in-cluster Jaeger OTLP receiver
    otlp/jaeger:
      endpoint: jaeger-collector.monitoring.svc.cluster.local:4317
      tls:
        insecure: true
    logging:
      verbosity: detailed
  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [otlp/jaeger, logging]

# Expose standard OTLP receiver ports on the service
ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    hostPort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    hostPort: 4318
    protocol: TCP

# Clean up resources for local deployment
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi
