[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Default test paths — run each suite from its own venv since they have separate deps.
# To run a specific suite: pytest detector/tests -v
testpaths =
    agent/tests
    detector/tests
    remediator/tests
    benchmarks/tests

# Suppress noisy warnings from third-party packages
filterwarnings =
    ignore::pytest.PytestDeprecationWarning
    ignore::DeprecationWarning:pkg_resources
