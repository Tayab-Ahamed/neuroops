services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus:/etc/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-remote-write-receiver'
    networks:
      - neuroops-network
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.61.0
    container_name: jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      # Note: OTLP ingestion is handled by otel-collector; Jaeger receives
      # traces via its own gRPC port only on the internal network.
      - "14250:14250"   # Jaeger gRPC (internal, for otel-collector → jaeger)
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - neuroops-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - jaeger
    networks:
      - neuroops-network
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: otel-collector
    command: ["--config=/etc/otel-col/config.yaml"]
    volumes:
      - ./observability/collector/otel-collector-config.yaml:/etc/otel-col/config.yaml
    ports:
      - "4317:4317"          # OTLP gRPC receiver (agents send traces here)
      - "4318:4318"          # OTLP HTTP receiver
      - "8889:8889"          # Prometheus metrics exporter port
    depends_on:
      - jaeger
    networks:
      - neuroops-network
    restart: unless-stopped

networks:
  neuroops-network:
    name: neuroops-network
    driver: bridge
