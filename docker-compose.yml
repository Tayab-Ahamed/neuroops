services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus:/etc/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-remote-write-receiver'
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - neuroops-network
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.61.0
    container_name: jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "14250:14250"   # Jaeger gRPC (internal, for otel-collector → jaeger)
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:16686/"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - neuroops-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/dashboards:/var/lib/grafana/dashboards
    depends_on:
      prometheus:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - neuroops-network
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: otel-collector
    command: ["--config=/etc/otel-col/config.yaml"]
    volumes:
      - ./observability/collector/otel-collector-config.yaml:/etc/otel-col/config.yaml
    ports:
      - "4317:4317"          # OTLP gRPC receiver (agents send traces here)
      - "4318:4318"          # OTLP HTTP receiver
      - "8889:8889"          # Prometheus metrics exporter port
    depends_on:
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8889/metrics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - neuroops-network
    restart: unless-stopped

  detector:
    build:
      context: ./detector
      dockerfile: Dockerfile
    container_name: detector
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - detector-models:/app/models
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - neuroops-network
    restart: unless-stopped

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: agent
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - JAEGER_QUERY_URL=http://jaeger:16686
      - JAEGER_COLLECTOR_URL=http://jaeger:14268
      - OTEL_COLLECTOR_ENDPOINT=http://otel-collector:4317
      - DETECTOR_URL=http://detector:8001
      - AGENT_URL=http://agent:8002
      - REMEDIATOR_URL=http://remediator:8003
    volumes:
      - agent-db:/app/checkpoints
    depends_on:
      otel-collector:
        condition: service_healthy
      detector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - neuroops-network
    restart: unless-stopped

  remediator:
    build:
      context: ./remediator
      dockerfile: Dockerfile
    container_name: remediator
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - JAEGER_QUERY_URL=http://jaeger:16686
      - JAEGER_COLLECTOR_URL=http://jaeger:14268
      - OTEL_COLLECTOR_ENDPOINT=http://otel-collector:4317
      - DETECTOR_URL=http://detector:8001
      - AGENT_URL=http://agent:8002
      - REMEDIATOR_URL=http://remediator:8003
    volumes:
      - remediator-db:/app/checkpoints
      - postmortems:/app/postmortems
    depends_on:
      agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - neuroops-network
    restart: unless-stopped

networks:
  neuroops-network:
    name: neuroops-network
    driver: bridge

volumes:
  detector-models:
  agent-db:
  remediator-db:
  postmortems:
